name: SafeChat CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: zishann555/safechat-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: zishann555/safechat-frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "/home/ubuntu/safechat"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/safechat

            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            docker pull zishann555/safechat-backend:latest
            docker pull zishann555/safechat-frontend:latest

            cat > docker-compose.yml << 'EOF'
            services:
              backend:
                image: zishann555/safechat-backend:latest
                container_name: safechat_backend
                restart: unless-stopped
                env_file:
                  - ./backend-ml/.env
                environment:
                  - PYTHONUNBUFFERED=1
                volumes:
                  - uploads_data:/app/uploads
                  - model_data:/app/models
                ports:
                  - "8000:8000"
                networks:
                  - safechat_net
                dns:
                  - 8.8.8.8
              frontend:
                image: zishann555/safechat-frontend:latest
                container_name: safechat_frontend
                restart: unless-stopped
                ports:
                  - "3000:80"
                networks:
                  - safechat_net
                depends_on:
                  - backend
            volumes:
              uploads_data:
                name: safechat_uploads
              model_data:
                name: safechat_models
            networks:
              safechat_net:
                name: safechat_network
                driver: bridge
            EOF

            docker compose down || true
            docker compose up -d
            docker image prune -f
            echo "Deployment complete!"