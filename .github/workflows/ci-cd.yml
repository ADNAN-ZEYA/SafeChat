name: SafeChat CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: zishann555/safechat-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: zishann555/safechat-frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  security-scan:
    name: Security Scan (DevSecOps)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: zishann555/safechat-backend:latest
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Scan frontend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: zishann555/safechat-frontend:latest
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Scan backend dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend-ml/requirements.txt
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
          scanners: vuln

      

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "nginx/"
          target: "/home/ubuntu/safechat"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/safechat

            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            docker pull zishann555/safechat-backend:latest
            docker pull zishann555/safechat-frontend:latest

            cat > docker-compose.yml << 'EOF'
            services:
              backend1:
                image: zishann555/safechat-backend:latest
                container_name: safechat_backend1
                restart: unless-stopped
                env_file:
                  - ./backend-ml/.env
                volumes:
                  - uploads_data:/app/uploads
                  - model_data:/app/models
                ports:
                  - "8001:8000"
                networks:
                  - safechat_net
                dns:
                  - 8.8.8.8
              backend2:
                image: zishann555/safechat-backend:latest
                container_name: safechat_backend2
                restart: unless-stopped
                env_file:
                  - ./backend-ml/.env
                volumes:
                  - uploads_data:/app/uploads
                  - model_data:/app/models
                ports:
                  - "8002:8000"
                networks:
                  - safechat_net
                dns:
                  - 8.8.8.8
              frontend:
                image: zishann555/safechat-frontend:latest
                container_name: safechat_frontend
                restart: unless-stopped
                ports:
                  - "3000:80"
                networks:
                  - safechat_net
            volumes:
              uploads_data:
              model_data:
            networks:
              safechat_net:
                driver: bridge
            EOF

            docker compose down || true
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deployment complete!"