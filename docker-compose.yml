version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: safechat-backend:latest
    container_name: safechat_backend
    restart: unless-stopped
    env_file:
      - ./backend-ml/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - uploads_data:/app/uploads
      - model_data:/app/models
    ports:
      - "8000:8000"
    networks:
      - safechat_net

    # ✅ backend healthcheck (good, just slightly cleaned)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # 🔴 IMPORTANT FIX (DON'T USE localhost IN PROD)
        VITE_API_BASE_URL: "http://13.205.175.224:8000"
    image: safechat-frontend:latest
    container_name: safechat_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - safechat_net

    depends_on:
      backend:
        condition: service_healthy

    # ✅ ADD HEALTHCHECK (this was missing → your main issue)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  uploads_data:
    name: safechat_uploads
  model_data:
    name: safechat_models

networks:
  safechat_net:
    name: safechat_network
    driver: bridge